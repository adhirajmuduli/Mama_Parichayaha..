name: Visual regression

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      - name: Cache Next.js build artifacts
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'public/**', 'next.config.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - run: corepack enable
      - run: corepack prepare npm@11.4.2 --activate
      - run: corepack npm ci
      - run: git lfs fsck
      - run: npx playwright install --with-deps chromium
      - run: corepack npm run test:visual
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: visual-regression-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
