name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      - name: Cache Next.js build artifacts
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'public/**', 'next.config.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - run: corepack enable
      - run: corepack prepare npm@11.4.2 --activate
      - run: corepack npm ci
      - run: git lfs fsck
      - run: corepack npm run build
      - run: corepack npm run prepare:standalone
      - name: Start the production server
        run: node .next/standalone/server.js > lighthouse-server.log 2>&1 &
        env:
          HOSTNAME: 127.0.0.1
          PORT: '3101'
      - name: Wait for the production server
        run: curl --fail --retry 20 --retry-all-errors --retry-delay 1 http://127.0.0.1:3101/
      - name: Audit Lighthouse budgets
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://127.0.0.1:3101/
          configPath: ./lighthouserc.json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-reports
          path: |
            .lighthouseci
            lighthouse-server.log
          if-no-files-found: warn
